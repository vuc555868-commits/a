<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bốc Quẻ Hôm Nay</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f8f5ef;
    text-align:center;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    color:#2f5d50;
}

button{
    background:#2f5d50;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.card{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    display:none;
}

.rank{
    font-size:28px;
    font-weight:bold;
}

.message{
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔮 BỐC QUẺ HÔM NAY</h1>
<p>Mỗi ngày chỉ nên bốc một lần 🍵</p>

<button onclick="drawFortune()">BỐC QUẺ</button>

<div class="card" id="result">
    <div class="rank" id="rank"></div>
    <div class="message" id="message"></div>
</div>

</div>

<script>

const fortunes = [

{
rank:"🌟 ĐẠI CÁT",
msg:"Hôm nay là ngày tuyệt vời để thử điều mới. May mắn đang đứng về phía bạn."
},

{
rank:"🍀 CÁT",
msg:"Một cơ hội nhỏ sẽ xuất hiện. Hãy mạnh dạn nắm lấy."
},

{
rank:"☕ BÌNH AN",
msg:"Chậm mà chắc. Hôm nay thích hợp để tận hưởng những điều đơn giản."
},

{
rank:"🍵 MATCHA KÝ",
msg:"Một ly matcha có thể mang đến nguồn cảm hứng bất ngờ."
},

{
rank:"🎲 MAY MẮN",
msg:"Vận may ở mức 8/10. Hãy thử vận với điều bạn đang phân vân."
},

{
rank:"🌸 TIỂU CÁT",
msg:"Một cuộc gặp gỡ thú vị có thể đến trong hôm nay."
},

{
rank:"✨ QUẺ VÀNG",
msg:"Chúc mừng! Hãy cho nhân viên xem màn hình này để nhận ưu đãi đặc biệt."
}

];

function drawFortune(){

const random =
fortunes[Math.floor(Math.random()*fortunes.length)];

document.getElementById("result").style.display="block";
document.getElementById("rank").innerText=random.rank;
document.getElementById("message").innerText=random.msg;

}

</script>

</body>
</html>
